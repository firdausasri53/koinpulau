<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulau Koin Clicker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: linear-gradient(180deg, #0f172a, #1e293b); 
      color: white;
      font-family: 'Arial', sans-serif; 
      text-align: center;
      user-select: none;
      height: 100vh;
      overflow: hidden;
    }
    #koin { 
      font-size: 36px; 
      margin: 20px; 
      color: #fbbf24; 
      text-shadow: 0 0 10px #fbbf2480;
      font-weight: bold;
    }
    #pulau {
      width: 220px; 
      height: 220px;
      background: radial-gradient(circle, #22c55e, #16a34a);
      border-radius: 50%;
      margin: 40px auto;
      cursor: pointer;
      transition: transform 0.08s cubic-bezier(.17,.67,.83,.67);
      box-shadow: 0 0 40px #22c55e80, inset 0 0 20px #ffffff40;
      border: 4px solid #15803d;
    }
    #pulau:active { transform: scale(0.88); }
    button {
      background: linear-gradient(180deg, #3b82f6, #2563eb);
      border: none;
      color: white;
      padding: 16px 28px;
      font-size: 18px;
      border-radius: 12px;
      margin: 12px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 4px 0 #1d4ed8;
    }
    button:active { transform: translateY(2px); box-shadow: 0 2px 0 #1d4ed8; }
    button:disabled { background: #475569; box-shadow: 0 4px 0 #334155; }
    #toko { 
      background: #1e293b90; 
      padding: 20px; 
      border-radius: 20px; 
      margin: 20px;
      border: 2px solid #334155;
    }
  </style>
</head>
<body>
  <div id="koin">Koin: 0</div>
  <div id="pulau"></div>
  
  <div id="toko">
    <h2>🛒 Toko Upgrade</h2>
    <button id="btnUpgrade" onclick="beliUpgrade()">
      Beli Cangkul (+1/Klik) - 10 Koin
    </button>
    <button onclick="resetGame()">🔄 Reset Game</button>
  </div>

  <script>
    let koin = 0, koinPerKlik = 1, hargaUpgrade = 10;
    const teksKoin = document.getElementById('koin');
    const pulau = document.getElementById('pulau');
    const btnUpgrade = document.getElementById('btnUpgrade');
   function bunyiTing() {
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const oscillator = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();
  
  oscillator.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  
  oscillator.type = 'sine';
  oscillator.frequency.value = 800;
  gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
  
  oscillator.start();
  oscillator.stop(audioCtx.currentTime + 0.1);
}
    // Load save
    let save = JSON.parse(localStorage.getItem('pulauKoinSave'));
    if(save) { koin = save.koin; koinPerKlik = save.koinPerKlik; hargaUpgrade = save.hargaUpgrade; }
    updateUI();
    
   pulau.addEventListener('click', () => {
  koin += koinPerKlik;
  
  bunyiTing(); // GANTI sfxKlik.play() JADI INI
  
  updateUI();
  saveGame();
});

    function beliUpgrade() {
      if(koin >= hargaUpgrade) {
        koin -= hargaUpgrade;
        koinPerKlik++;
        hargaUpgrade = Math.floor(hargaUpgrade * 1.8);
        updateUI();
        saveGame();
      }
    }

    function updateUI() {
      teksKoin.textContent = 'Koin: ' + koin.toLocaleString();
      btnUpgrade.textContent = `Beli Cangkul (+1/Klik) - ${hargaUpgrade} Koin`;
      btnUpgrade.disabled = koin < hargaUpgrade;
    }

    function saveGame() {
      localStorage.setItem('pulauKoinSave', JSON.stringify({koin, koinPerKlik, hargaUpgrade}));
    }

    function resetGame() {
      if(confirm('Yakin reset? Semua progress hilang')) {
        localStorage.removeItem('pulauKoinSave');
        location.reload();
      }
    }
  </script>
</body>
</html>
